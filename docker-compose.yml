# version: "3.8"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - news_network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - news_network

  postgres:
    image: postgres:15
    container_name: postgres_dwh
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: newsdw
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - news_network

  consumer:
      build: .
      container_name: kafka_consumer
      depends_on:
        - kafka
        - minio
      environment:
        KAFKA_SERVER: kafka:29092
        MINIO_SERVER: minio:9000
        DB_HOST: postgres
      volumes:
        - .:/app
      working_dir: /app
      command: python consumer_bronze.py
      restart: always
      networks:
        - news_network

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9002:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - news_network

  airflow:
    image: apache/airflow:2.8.0
    container_name: airflow
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres/newsdw
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__WEBSERVER__RBAC: "true"
      AIRFLOW__LOGGING__REMOTE_LOGGING: "False"
      DB_HOST: postgres
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/airflow/project
    ports:
      - "8080:8080"
    command: >
      bash -c "pip install -r /opt/airflow/project/requirements.txt -q &&
               airflow db migrate &&
               airflow users create -u admin -p admin -f Admin -l Admin -r Admin -e admin@admin.com ;
               airflow webserver & airflow scheduler"
    networks:
     - news_network
volumes:
  postgres_data:
  minio_data:

networks:
  news_network:
    driver: bridge